<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distributor Dashboard • Millet Supply Chain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f7fa; font-family: 'Segoe UI', sans-serif; }
    .navbar { background-color: #e8f5e9; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
    .navbar-brand { font-weight: bold; font-size: 1.5rem; color: #2e7d32 !important; }
    .sidebar { min-height: 100vh; background: #2e7d32; color: #fff; padding: 1rem; }
    .sidebar a { color: #fff; display: block; margin-bottom: 1rem; text-decoration: none; font-weight: 500; }
    .sidebar a:hover { text-decoration: underline; }
    .card { border: 0; border-radius: 1rem; box-shadow: 0 6px 20px rgba(0,0,0,.05); }
    .card-header { background-color: #e8f5e9; font-weight: 600; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/7651/7651380.png" height="36" class="me-2" />
      Distributor Dashboard – Millet Supply Chain
    </a>
  </div>
</nav>

<div class="d-flex">
  <div class="sidebar">
    <h4 class="mb-4">🚚 Distributor Menu</h4>
    <a href="#" onclick="showSection('stock')">📦 My Stock</a>
    <a href="#" onclick="showSection('placeOrder')">📝 Place Order</a>
    <a href="#" onclick="showSection('orderHistory')">📜 Order History</a>
    <a href="#" onclick="showSection('sales')">💰 Sales Entry</a>
  </div>

  <div class="flex-grow-1 p-4">

    <!-- My Stock -->
    <div class="card mb-4" id="stock">
      <div class="card-header">📦 Current Stock</div>
      <div class="card-body">
        <table class="table table-bordered">
          <thead><tr><th>#</th><th>Product</th><th>SKU</th><th>Qty</th><th>MRP</th></tr></thead>
          <tbody id="stockTable"><tr><td colspan="5" class="text-muted">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Place Order -->
    <div class="card mb-4" id="placeOrder" style="display:none">
      <div class="card-header">📝 Place New Order</div>
      <div class="card-body">
        <form id="orderForm">
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Product</label>
              <select name="productId" class="form-select" required id="productSelect"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Quantity</label>
              <input type="number" name="qty" class="form-control" required />
            </div>
          </div>
          <button type="submit" class="btn btn-success">Place Order</button>
        </form>
      </div>
    </div>

    <!-- Order History -->
    <div class="card mb-4" id="orderHistory" style="display:none">
      <div class="card-header">📜 Order History</div>
      <div class="card-body">
        <table class="table table-striped">
          <thead><tr><th>#</th><th>Product</th><th>Qty</th><th>Status</th><th>Date</th></tr></thead>
          <tbody id="historyTable"><tr><td colspan="5" class="text-muted">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Sales Entry -->
    <div class="card" id="sales" style="display:none">
      <div class="card-header">💰 Enter Sales</div>
      <div class="card-body">
        <form id="salesForm">
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Product</label>
              <select name="productId" class="form-select" required id="salesProduct"></select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Qty Sold</label>
              <input type="number" name="qty" class="form-control" required />
            </div>
          </div>
          <button type="submit" class="btn btn-success">Record Sale</button>
        </form>
      </div>
    </div>

  </div>
</div>

<script>
const distributorId = localStorage.getItem("distributorId") || 1;

function showSection(id) {
  ['stock', 'placeOrder', 'orderHistory', 'sales'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
  if (id === 'stock') loadStock();
  if (id === 'orderHistory') loadHistory();
}

document.addEventListener("DOMContentLoaded", () => {
  loadStock();
  loadProductOptions();
});

function loadStock() {
  fetch(`https://millet-backend.onrender.com/api/distributor/stock?distributorId=${distributorId}`)
    .then(res => res.json())
    .then(data => {
      const tbody = document.getElementById("stockTable");
      tbody.innerHTML = "";
      data.stock.forEach((item, i) => {
        tbody.innerHTML += `<tr><td>${i+1}</td><td>${item.productName}</td><td>${item.sku}</td><td>${item.qty}</td><td>₹${item.mrp}</td></tr>`;
      });
    });
}

function loadProductOptions() {
  fetch(`https://millet-backend.onrender.com/api/products`)
    .then(res => res.json())
    .then(data => {
      const productSelect = document.getElementById("productSelect");
      const salesProduct = document.getElementById("salesProduct");
      productSelect.innerHTML = salesProduct.innerHTML = "";
      data.products.forEach(p => {
        const opt = `<option value="${p.id}">${p.name}</option>`;
        productSelect.innerHTML += opt;
        salesProduct.innerHTML += opt;
      });
    });
}

// FIXED orderForm submission
document.getElementById("orderForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const form = new FormData(this);
  fetch("https://millet-backend.onrender.com/api/order", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      distributor_id: distributorId,  // ✅ changed key
      product_id: form.get("productId"),  // ✅ changed key
      qty: parseInt(form.get("qty"))
    })
  }).then(res => res.json())
    .then(data => {
      alert("✅ Order placed!");
      this.reset();
      loadHistory();
    });
});

document.getElementById("salesForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const form = new FormData(this);
  fetch("https://millet-backend.onrender.com/api/distributor/sales", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      distributorId,
      productId: form.get("productId"),
      qty: parseInt(form.get("qty"))
    })
  }).then(res => res.json())
    .then(data => {
      alert("✅ Sale recorded!");
      this.reset();
      loadStock();
    });
});

function loadHistory() {
  fetch(`https://millet-backend.onrender.com/api/distributor/orders?distributorId=${distributorId}`)
    .then(res => res.json())
    .then(data => {
      const tbody = document.getElementById("historyTable");
      tbody.innerHTML = "";
      data.orders.forEach((o, i) => {
        tbody.innerHTML += `<tr><td>${i+1}</td><td>${o.productName}</td><td>${o.qty}</td><td>${o.status}</td><td>${new Date(o.date).toLocaleString()}</td></tr>`;
      });
    })
    .catch(err => {
      console.error("❌ Error loading history:", err);
    });
}
</script>
</body>
</html>
